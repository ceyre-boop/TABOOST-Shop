<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Sync Demo - TABOOST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #ff0044);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        .status.loading { background: #f0a500; color: #000; }
        .status.success { background: #00ff88; color: #000; }
        .status.error { background: #ff0044; color: #fff; }
        
        .search-box {
            max-width: 400px;
            margin: 0 auto 30px;
        }
        .search-box input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .last-updated {
            text-align: center;
            color: #666;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">AUTO-SYNC DEMO</div>
        <div class="status loading" id="status">Loading data...</div>
    </div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchData()">
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-label">Total Creators</div>
            <div class="stat-value" id="totalCreators">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total GMV</div>
            <div class="stat-value" id="totalGMV">-</div>
        </div>
    </div>
    
    <div class="last-updated" id="lastUpdated"></div>

    <script src="js/auto-sync-loader.js"></script>
    <script>
        let allData = [];
        
        async function loadData() {
            const statusEl = document.getElementById('status');
            
            try {
                const loader = new AutoSyncDataLoader({
                    csvUrl: 'data/auto-sync.csv',
                    cacheBust: true
                });
                
                allData = await loader.load();
                
                // Update UI
                document.getElementById('totalCreators').textContent = allData.length;
                
                // Calculate total GMV
                const totalGMV = allData.reduce((sum, row) => {
                    const gmv = parseFloat(row.total_gmv || row.gmv || 0);
                    return sum + (isNaN(gmv) ? 0 : gmv);
                }, 0);
                document.getElementById('totalGMV').textContent = '$' + totalGMV.toLocaleString();
                
                statusEl.textContent = `✅ Loaded ${allData.length} creators`;
                statusEl.className = 'status success';
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleString();
                
            } catch (error) {
                console.error('Failed to load:', error);
                statusEl.textContent = '❌ Error: ' + error.message;
                statusEl.className = 'status error';
            }
        }
        
        function searchData() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            const loader = new AutoSyncDataLoader();
            const match = loader.findByName(allData, query);
            
            if (match) {
                console.log('Found:', match);
                alert(`Found: ${match.name}\nGMV: ${match.total_gmv || match.gmv || 'N/A'}`);
            }
        }
        
        // Load on page load
        loadData();
        
        // Auto-refresh every 5 minutes (300000ms)
        setInterval(loadData, 300000);
    </script>
</body>
</html>
