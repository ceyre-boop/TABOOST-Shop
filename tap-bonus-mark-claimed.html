<!DOCTYPE html>
<html>
<head>
    <title>TABOOST - Mark TAP Bonus as Claimed</title>
    <script src="js/shop-data.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrApQHC1Fvbjm9EVTptt2kNG2mDb1PzXE",
            authDomain: "taboost-platform.firebaseapp.com",
            projectId: "taboost-platform",
            storageBucket: "taboost-platform.firebasestorage.app",
            messagingSenderId: "379293685859",
            appId: "1:379293685859:web:d89592adbf67360b574056"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Must mirror TAP_BONUS_TIERS in js/shop-dashboard.js exactly.
        const TAP_BONUS_TIERS = [
            { key: 'tier1', threshold: 100000, amount: 500, goal: 'GOAL 1' },
            { key: 'tier2', threshold: 250000, amount: 1000, goal: 'GOAL 2' },
            { key: 'tier3', threshold: 1000000, amount: 1500, goal: 'GOAL 3' }
        ];

        let foundUser = null; // { uid, name, email }

        function log(msg, type) {
            const el = document.getElementById('log');
            const div = document.createElement('div');
            div.className = type || 'info';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        window.lookupCreator = async function () {
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            foundUser = null;
            document.getElementById('markSection').style.display = 'none';
            if (!email) { log('Enter an email first.', 'error'); return; }

            log(`Looking up ${email}...`, 'info');
            try {
                const usersQ = query(collection(db, 'users'), where('email', '==', email));
                const snap = await getDocs(usersQ);
                if (snap.empty) {
                    log('No users/{uid} doc found for that email. They may not have signed up yet.', 'error');
                    return;
                }
                const d = snap.docs[0];
                const data = d.data();
                // Match the real claim flow's source of truth for the display name
                // (js/shop-dashboard.js uses myData.name from this same compiled file).
                const shopRecord = (typeof allShopData !== 'undefined') ? allShopData.find(c => c.email === email) : null;
                const name = (shopRecord && (shopRecord.name || shopRecord.username)) || data.name || data.displayName || data.username || email;
                foundUser = { uid: d.id, name, email };

                const claimsQ = query(collection(db, 'tapBonusClaims'), where('uid', '==', d.id));
                const claimsSnap = await getDocs(claimsQ);
                const claimed = new Set();
                claimsSnap.forEach(c => claimed.add(c.data().tier));

                log(`Found: ${foundUser.name} (uid ${d.id}). Opted in: ${!!data.tapBonusOptIn}. Already claimed: ${claimed.size ? [...claimed].join(', ') : 'none'}`, 'success');
                document.getElementById('markSection').style.display = 'block';
            } catch (e) {
                log('Lookup failed: ' + e.message, 'error');
            }
        };

        window.markClaimed = async function () {
            if (!foundUser) return;
            const tierKey = document.getElementById('tierSelect').value;
            const tier = TAP_BONUS_TIERS.find(t => t.key === tierKey);
            const claimId = foundUser.uid + '_' + tier.key;

            try {
                const existing = await getDoc(doc(db, 'tapBonusClaims', claimId));
                if (existing.exists()) {
                    log(`${foundUser.name} already has ${tier.goal} marked as claimed — nothing to do.`, 'info');
                    return;
                }
                await setDoc(doc(db, 'tapBonusClaims', claimId), {
                    uid: foundUser.uid,
                    tier: tier.key,
                    creatorName: foundUser.name,
                    claimedAt: serverTimestamp()
                });
                log(`Marked ${tier.goal} ($${tier.amount}) as claimed for ${foundUser.name}. No email was sent — this only updates their dashboard.`, 'success');
            } catch (e) {
                log('Failed to mark as claimed: ' + e.message, 'error');
            }
        };

        log('Ready. This tool marks a bonus as already-claimed (e.g. you already paid them some other way) so their dashboard stops showing a CLAIM button for it. It does NOT send an email to Marco.', 'info');
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; max-width: 700px; margin: 0 auto; }
        h1 { color: #00ff88; font-size: 22px; }
        .warning { background: #451a03; border: 1px solid #92400e; color: #fbbf24; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 14px; }
        input, select { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; margin: 8px 0; font-size: 14px; box-sizing: border-box; }
        .btn { background: linear-gradient(135deg, #00ff88, #00cc6a); color: #001a0d; border: none; padding: 14px 24px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 8px 0; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .log { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>Mark TAP Bonus as Claimed</h1>
    <div class="warning">
        For creators you've already paid a TAP bonus outside this system. This marks that
        tier as claimed on their dashboard (no more CLAIM button for it) — it does NOT
        send anything to Marco.
    </div>

    <label>Creator's email (the one they log in with)</label>
    <input id="emailInput" type="email" placeholder="creator@example.com">
    <button class="btn" onclick="lookupCreator()">Look Up Creator</button>

    <div id="markSection" style="display:none;">
        <label>Which bonus did you already pay?</label>
        <select id="tierSelect">
            <option value="tier1">GOAL 1 — $500 (past $100K)</option>
            <option value="tier2">GOAL 2 — $1,000 (past $250K)</option>
            <option value="tier3">GOAL 3 — $1,500 (past $1M)</option>
        </select>
        <button class="btn" onclick="markClaimed()">Mark as Claimed (Already Paid)</button>
    </div>

    <div class="log" id="log"></div>
</body>
</html>
