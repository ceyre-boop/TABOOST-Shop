name: Preview Deploy — hero-preview-deploy

# Triggers on every push to either preview branch.
# Builds a combined gh-pages publish directory:
#   - root/           ← production content from `main`
#   - root/preview/hero-preview-deploy/  ← this branch's content
# This keeps shop.taboost.me/ (production) working AND
# shop.taboost.me/preview/hero-preview-deploy/ (preview) working.
on:
  push:
    branches:
      - hero-preview-deploy
      - copilot/add-hero-section-animations
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-preview:
    name: Deploy preview + production to gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          path: preview-content

      - name: Checkout main (production)
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod-content

      - name: Build combined deploy directory
        run: |
          mkdir -p deploy

          # Copy production content to root (exclude .git and dev-only files)
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='*.py' \
                   --exclude='*.bat' \
                   --exclude='*.gs' \
                   --exclude='*.workspace' \
                   --exclude='marco-dashboard' \
                   --exclude='scripts' \
                   --exclude='data' \
                   prod-content/ deploy/

          # Copy preview content to preview subdirectory
          mkdir -p deploy/preview/hero-preview-deploy
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='*.py' \
                   --exclude='*.bat' \
                   --exclude='*.gs' \
                   --exclude='*.workspace' \
                   --exclude='marco-dashboard' \
                   --exclude='scripts' \
                   --exclude='data' \
                   preview-content/ deploy/preview/hero-preview-deploy/

      - name: Deploy combined site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          # force_orphan creates a single clean commit each deploy (no history in gh-pages)
          force_orphan: true
